<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Gallery</title>
  <style>
    .gallary-img{
      width: 300px;
      height: 380px;
      object-fit: cover;
      background-color: tomato;
      display: block;
      margin: 20px auto;
      border-radius: 10px;
    }
    .btn-container{
      position: relative;
      width: 300px;
      border: 2px solid #000;
      display: block;
      margin: 15px auto;
      border-radius: 10px;
      padding: auto 20px;
    }
    .btn{
      height: 30px;
      margin: 0 10px;
      cursor: pointer;
      background-color: #fff;
      border-radius: 50%;
    position: absolute;
      top: 180px;
    }
    .btn-left{
      left: -30px;
    }

    .btn-right{
      right: -30px;
    }
  </style>
</head>
<body>

<div class="btn-container">
  <img src="./img1.jpg" class="gallary-img" id="img"/>
  <img src="./left-arrow.png" class="btn btn-left" onclick="prev()" />
  <img src="./right.png" class="btn btn-right" onclick="next()" />
</div>

<script>
  const imagesArr = [
    "./img1.jpg",
    "./img2.jpg",
    "./img3.jpeg",
    "./img4.jpeg",
 
  ];
  let imgIndex = 0;
  
  const imgElement = document.getElementById('img');

  function prev(){
    if (imgIndex == 0) {
      imgIndex = imagesArr.length - 1;
    } else {
      imgIndex--;
    }
    imgElement.src = imagesArr[imgIndex];
  }
  function next(){
    if (imgIndex == imagesArr.length - 1) {
      imgIndex = 0;
    } else {
      imgIndex++;
    }
    imgElement.src = imagesArr[imgIndex];
  }
</script>
</body>
</html>
